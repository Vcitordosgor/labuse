<!doctype html>
<!-- ============================================================================
  LA BUSE — LA PORTE · Direction « TERRITOIRE » (Bloc A · A3)
  Parti pris : la donnée comme décor. Les contours communaux de La Réunion en
  filigrane ultra-sombre (presque subliminal, jamais illustratif — généré depuis
  communes974.geojson, le vrai périmètre servi), le module de connexion flottant
  au centre, une signature de données dosée. L'app affirme ce qu'elle sait
  avant même d'ouvrir.
  Page 100 % statique (zéro framework). Les 4 états : défaut · focus · erreur ·
  chargement (interactions réelles + sélecteur de revue, chrome de maquette).
============================================================================= -->
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LABUSE — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060A08; --s1: #0B100D; --s2: #0D120F; --line: #1B2620; --line2: #1E2A23;
    --mint: #5CE6A1; --mint-ink: #06130C; --err: #E8695A;
    --txt-hi: #ECF5EF; --txt: #C9DCD1; --txt-mut: #8FA69A; --txt-dim: #5C7268;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--txt); font: 15px/1.5 Inter, sans-serif;
    display: grid; place-items: center; padding: 24px; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── le territoire : contours communaux réels, presque subliminaux ── */
  .ile {
    position: fixed; inset: 0; display: grid; place-items: center; z-index: 0;
    pointer-events: none;
  }
  .ile svg {
    width: min(118vh, 96vw); opacity: .85;
    fill: none; stroke: #101913; stroke-width: 1.1;
  }
  /* halo mint imperceptible derrière le module — la carte « respire » sans s'exhiber */
  .halo { position: fixed; inset: 0; z-index: 1; pointer-events: none;
          background: radial-gradient(46vh 40vh at 50% 48%, rgba(92,230,161,.045), transparent 70%); }

  /* ── le module flottant ── */
  main { position: relative; z-index: 2; width: min(384px, 100%);
         animation: entree .5s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes entree { from { opacity: 0; transform: translateY(10px); } }
  @media (prefers-reduced-motion: reduce) { main { animation: none; } }
  .module {
    background: color-mix(in srgb, var(--s1) 88%, transparent);
    backdrop-filter: blur(6px);
    border: 1px solid var(--line); border-radius: 16px; padding: 34px 34px 30px;
    box-shadow: 0 30px 80px -30px rgba(0,0,0,.8);
  }
  .identite { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
  .identite svg { height: 15px; width: auto; fill: #2FE0A0;
                  filter: drop-shadow(0 0 6px rgba(47,224,160,.35)); }
  .identite b { font: 700 13.5px "Space Grotesk", sans-serif; letter-spacing: .18em;
                color: var(--txt-hi); }

  label { display: block; font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
          color: var(--txt-mut); margin: 0 0 7px 1px; }
  input {
    width: 100%; background: var(--s2); border: 1px solid var(--line2); border-radius: 10px;
    color: var(--txt-hi); font: 15px/1 Inter, sans-serif; padding: 12px 14px;
    outline: none; transition: border-color .2s, box-shadow .2s; caret-color: var(--mint);
    margin-bottom: 18px;
  }
  input:focus { border-color: var(--mint); box-shadow: 0 0 0 3px rgba(92,230,161,.13); }
  input::placeholder { color: #3d4a43; }

  button.entrer {
    width: 100%; border: 0; border-radius: 10px; padding: 12px;
    background: var(--mint); color: var(--mint-ink);
    font: 600 14px Inter, sans-serif; letter-spacing: .02em; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: filter .2s, transform .1s;
  }
  button.entrer:hover { filter: brightness(1.07); }
  button.entrer:active { transform: translateY(1px); }
  button.entrer:focus-visible { outline: 2px solid var(--txt-hi); outline-offset: 2px; }

  /* ── erreur : une ligne, l'espace est réservé, rien ne saute ── */
  .erreur { min-height: 30px; padding-top: 10px; font-size: 13px; color: var(--err);
            opacity: 0; transition: opacity .3s; }
  body[data-etat="erreur"] .erreur { opacity: 1; }
  body[data-etat="erreur"] input[type=password] { border-color: rgba(232,105,90,.55); }

  /* ── chargement : le bouton l'affiche, le module reste en place ── */
  .anneau { width: 14px; height: 14px; border-radius: 50%; display: none;
            border: 2px solid rgba(6,19,12,.25); border-top-color: var(--mint-ink);
            animation: rot .7s linear infinite; }
  @keyframes rot { to { rotate: 1turn; } }
  body[data-etat="chargement"] .anneau { display: block; }
  body[data-etat="chargement"] .libelle::after { content: "…"; }
  body[data-etat="chargement"] input { opacity: .55; pointer-events: none; }
  body[data-etat="chargement"] button.entrer { pointer-events: none; filter: saturate(.8); }

  /* ── la signature de données — dosée ── */
  .donnees { margin-top: 22px; text-align: center;
             font: 11px "JetBrains Mono", monospace; color: var(--txt-dim);
             letter-spacing: .04em; }
  .donnees b { color: var(--txt-mut); font-weight: 400; }

  @media (max-width: 480px) {
    .module { padding: 28px 22px 24px; }
    .ile svg { width: 160vw; }              /* l'île déborde du cadre : texture, pas illustration */
  }

  /* ═══ chrome de MAQUETTE (revue des 4 états) — à retirer au branchement ═══ */
  .revue { position: fixed; right: 14px; bottom: 12px; z-index: 3;
           font: 10px "JetBrains Mono", monospace; color: #46584f;
           display: flex; gap: 4px; align-items: center; }
  .revue button { background: none; border: 1px solid #14201a; border-radius: 4px;
                  color: #5C7268; font: inherit; padding: 3px 7px; cursor: pointer; }
  .revue button[aria-pressed="true"] { color: var(--mint); border-color: #24443597; }
</style>
</head>

<main>
  <form class="module" autocomplete="off" onsubmit="return demo(event)">
    <div class="identite">
      <svg viewBox="0 0 240 82" role="img" aria-label="LA BUSE">
        <path d="M2 15 C58 10 100 18 120 27 C140 18 182 10 238 15 C202 29 162 40 135 46 C127 49 122 53 120 60 C118 53 113 49 105 46 C78 40 38 29 2 15 Z"/>

<!-- sélecteur de revue — chrome de maquette, jamais en production -->
<div class="revue" aria-hidden="true">
  <button onclick="etat('defaut')" aria-pressed="true">défaut</button>
  <button onclick="etat('focus')">focus</button>
  <button onclick="etat('erreur')">erreur</button>
  <button onclick="etat('chargement')">chargement</button>
</div>

<script>
  // maquette : la soumission joue chargement → erreur (le vrai POST /login prendra la place)
  function demo(e) {
    e.preventDefault(); etat('chargement');
    setTimeout(() => etat('erreur'), 1200);
    return false;
  }
  function etat(s) {
    document.body.dataset.etat = s;
    document.querySelectorAll('.revue button').forEach(b => b.setAttribute('aria-pressed', b.textContent === s));
    if (s === 'focus') document.getElementById('mdp').focus();
    else if (document.activeElement?.id === 'mdp' && s === 'defaut') document.activeElement.blur();
  }
</script>
