# =============================================================================
# LA BUSE — Nginx reverse proxy (app.labuse.immo → Uvicorn 127.0.0.1:8000)
# -----------------------------------------------------------------------------
# Pose (NE PAS appliquer maintenant — voir docs/DEPLOYMENT_OVH_VPS.md §9-10) :
#   install -o root -g root -m 644 deploy/nginx/labuse.conf /etc/nginx/sites-available/labuse.conf
#   ln -sf /etc/nginx/sites-available/labuse.conf /etc/nginx/sites-enabled/labuse.conf
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d app.labuse.immo -d labuse.immo -d www.labuse.immo
#
# Domaines : app.labuse.immo = l'APPLICATION (canonique) ; labuse.immo = redirige vers l'app.
# =============================================================================

# Support WebSocket (précaution — l'app n'en utilise pas aujourd'hui, mais l'upgrade est prêt).
# Contexte http{} (ce fichier est inclus dans http{} via sites-enabled).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream labuse_app {
    server 127.0.0.1:8000;
    keepalive 16;
}

# --- HTTP (port 80) : ACME (certbot webroot) + redirection vers HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name labuse.immo www.labuse.immo app.labuse.immo;

    # Challenge Let's Encrypt (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://app.labuse.immo$request_uri;
    }
}

# --- HTTPS : l'APPLICATION (app.labuse.immo) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.labuse.immo;

    # Certificats : créés/gérés par certbot (les chemins existent après l'étape 10).
    ssl_certificate     /etc/letsencrypt/live/app.labuse.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.labuse.immo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Taille max d'upload (exports / imports légers) ; l'app reste petite.
    client_max_body_size 25m;

    # En-têtes de sécurité.
    add_header X-Content-Type-Options    nosniff                     always;
    add_header X-Frame-Options           SAMEORIGIN                  always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    add_header X-XSS-Protection          "1; mode=block"             always;
    # HSTS : à activer SEULEMENT une fois le HTTPS confirmé stable.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Healthcheck sans bruit de logs (sonde de monitoring).
    location = /healthz {
        proxy_pass http://labuse_app;
        access_log off;
    }

    location / {
        proxy_pass http://labuse_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (précaution)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}

# --- HTTPS : apex labuse.immo (+ www) → redirige vers l'app ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name labuse.immo www.labuse.immo;

    ssl_certificate     /etc/letsencrypt/live/app.labuse.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.labuse.immo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://app.labuse.immo$request_uri;
}
