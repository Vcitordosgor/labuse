# =============================================================================
# LA BUSE — réglages PostgreSQL 16 pour OVH VPS-2 (4 vCores / 8 Go RAM / SSD NVMe)
# -----------------------------------------------------------------------------
# Fichier d'INCLUSION (ne remplace pas postgresql.conf, il le surcharge).
#
# Installation (NE PAS appliquer maintenant — voir docs/DEPLOYMENT_OVH_VPS.md §3bis) :
#   install -o postgres -g postgres -m 644 deploy/postgresql/postgresql.vps2.conf \
#       /etc/postgresql/16/main/conf.d/zz-labuse-vps2.conf
#   systemctl restart postgresql
#
# Le préfixe « zz- » garantit que ces valeurs sont lues EN DERNIER (donc gagnantes).
# =============================================================================

# --- Sécurité réseau : la base n'écoute QUE en local (l'app est sur la même machine) ---
listen_addresses = 'localhost'

# --- Mémoire (calibré pour 8 Go ; la base ~1,5-2 Go tient alors entièrement en cache) ---
shared_buffers = 2GB                 # ~25 % de la RAM
effective_cache_size = 6GB           # estimation du cache OS+PG visible par le planner (~75 %)
work_mem = 48MB                      # par nœud de tri/hash ; OK car peu de connexions concurrentes
maintenance_work_mem = 512MB         # CREATE INDEX / VACUUM / restauration (montable à 1GB ponctuel)
# Astuce restauration massive : SET maintenance_work_mem='1GB'; avant un gros pg_restore.

# --- Disque SSD/NVMe : le planner doit privilégier les index (dont les GIST spatiaux) ---
random_page_cost = 1.1               # SSD (défaut 4.0 = hypothèse disque mécanique → sous-utilise les index)
effective_io_concurrency = 200       # NVMe

# --- Connexions : 2-5 utilisateurs + workers Uvicorn + maintenance → 50 suffit largement ---
max_connections = 50                 # baisser le défaut (100) libère de la RAM pour work_mem

# --- Parallélisme (4 vCores, partagés avec l'app) ---
max_worker_processes = 8
max_parallel_workers = 4
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

# --- Garde-fou requêtes : aucune requête applicative ne doit monopoliser un cœur ---
statement_timeout = 15000            # 15 s (les requêtes fiche/carte sont sous-seconde)
idle_in_transaction_session_timeout = 60000   # 60 s : libère les transactions oubliées
lock_timeout = 5000                  # 5 s
# NB : VACUUM / ingestion / restauration ne sont PAS des "statements" client classiques ;
#      au besoin, faire « SET statement_timeout = 0 » dans la session de maintenance.

# --- WAL & checkpoints : lissés pour éviter les à-coups d'I/O ---
wal_level = replica                  # permet une future réplication / PITR
wal_compression = on                 # moins d'I/O et de volume WAL
max_wal_size = 2GB
min_wal_size = 256MB
checkpoint_completion_target = 0.9
synchronous_commit = on              # sécurité de la donnée (foncier) : on ne sacrifie pas la durabilité

# --- JIT : désactivé (sur ce profil OLTP spatial, le JIT ajoute surtout de la latence) ---
jit = off

# --- Observabilité (utile pour le tuning ; volumétrie de logs maîtrisée) ---
log_min_duration_statement = 1000    # journalise les requêtes > 1 s
log_checkpoints = on
log_temp_files = 0                    # signale tout fichier temporaire (work_mem trop bas ?)
log_line_prefix = '%m [%p] %q%u@%d '

# --- Autovacuum un peu plus réactif (cascade_results se met à jour souvent) ---
autovacuum = on
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
