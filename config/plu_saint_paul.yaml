# =============================================================================
# PLU SAINT-PAUL (974) — règles chiffrées par zone constructible (U / AU)
# =============================================================================
# Source unique : règlement écrit du PLU de Saint-Paul.
#   document : 04_REGLT_PLU_st_paul_approuve_27septembre2012__Edition_mars2026.pdf
#   url      : https://www.mairie-saintpaul.re/wp-content/uploads/2026/03/04_REGLT_PLU_st_paul_approuve_27septembre2012__Edition_mars2026.pdf
#   PLU approuvé le 27/09/2012, édition mars 2026 (413 p.). ⚠️ La consigne disait
#   2019 ; le document officiel dit bien 2012 (+ modifs jusqu'au 27/03/2025).
#
# FIABILITÉ (n'inventer AUCUNE valeur) :
#   - page_pdf = page_imprimee + 4   (vérifié : imprimée 1 = PDF 5)
#   - chaque valeur cite ZONE + ARTICLE (+ page imprimée de la section).
#   - null         = règle explicitement "non réglementée" / "il n'est pas fixé de règle".
#   - "a_verifier" = présent mais ambigu / conditionnel / non attribuable sûrement.
#   - hauteurs : he_m = égout/acrotère, hf_m = faîtage (mètres). "En l'absence
#     d'indication, la hauteur maximale est considérée comme la hauteur au faîtage."
#     Donc quand seul un chiffre est donné => hf_m, he_m laissé null (non précisé).
#   - PLU à 16 articles : 6=recul voirie, 7=recul limites, 9=emprise, 10=hauteur,
#     12=stationnement, 13=espaces libres/pleine terre.
#   - Les zones AU renvoient explicitement aux règles de la zone U de même indice
#     (cf. "caractère de zone" : « se reporter au règlement de la zone U… »).
# =============================================================================

source:
  document: "04_REGLT_PLU_st_paul_approuve_27septembre2012__Edition_mars2026.pdf"
  url: "https://www.mairie-saintpaul.re/wp-content/uploads/2026/03/04_REGLT_PLU_st_paul_approuve_27septembre2012__Edition_mars2026.pdf"
  approbation: "2012-09-27"
  edition: "2026-03"
  pages_total: 413
  offset_pdf_vs_imprimee: 4

# Règles transverses constatées (s'appliquent largement, à pondérer par sous-zone) :
regles_transverses:
  recul_limites_sep: "Implantation sur limite autorisée (longueur max 10-18 m selon zone) OU retrait >= 3 m. H réduite (6-9 m) dans une bande de 3 m depuis la limite. (Art. 7)"
  pleine_terre: "Au moins 50 % de la surface perméable doit être traitée en pleine terre plantée. Le % minimal d'espaces libres perméables varie par sous-zone et par aléa PPRI. (Art. 13)"
  stationnement_aide: "Logements aidés : 1 place / logement aidé (Art. 12)."

# Hypothèses de CALCUL de la pré-faisabilité (éditables ici, sans toucher au code ;
# toutes affichées dans la fiche comme hypothèses). Ce ne sont PAS des règles PLU.
hypotheses_faisabilite:
  etage_m: 3.0                      # hauteur d'un niveau
  coef_occupation: 0.45             # emprise constructible -> emprise réellement bâtie au sol
  coef_rendement: 0.80              # surface de plancher BRUTE -> surface HABITABLE vendable
  logement_m2_bas: 65.0             # surface moyenne d'un logement (borne basse)
  logement_m2_haut: 80.0            # surface moyenne d'un logement (borne haute)
  place_m2: 25.0                    # 1 place de stationnement (avec circulation)
  densite_logts_ha_par_niveau: 30.0 # plafond densité = ce taux x niveaux (logts/ha) — filet ex-COS
  # --- Bilan promoteur (CA, charge foncière) ---
  cout_construction_m2_bas: 1800.0  # coût de construction au m² habitable (borne basse)
  cout_construction_m2_haut: 2200.0 # idem (borne haute)
  marge_promoteur_pct: 0.09         # marge promoteur (% du CA) — fourchette réelle 8–10 %, à affiner
  frais_annexes_pct: 0.12           # honoraires + commercialisation + financier + aléas (% du CA)
  dvf_radius_m: 1500.0              # rayon de recherche des ventes DVF comparables (m)
  dvf_min_ventes: 8                # en deçà, prix DVF non fiable -> on le dit, on n'invente pas
  # --- Prescriptions GPU (Décisions 3.b / 3.c) ---
  pct_lls: 30                       # VALIDÉ Vic : 30 % de logements aidés en secteur de mixité sociale.
  #   Source : Règlement PLU Saint-Paul, Article 2 « Occupations et utilisations du sol soumises
  #   à des conditions particulières », clause de logement aidé (p.11, Titre 2 Livret 1 ; valeur
  #   identique 30 % dans tous les bassins). Appliqué au CA UNIQUEMENT si la clause est DÉCLENCHÉE
  #   (seuils ci-dessous) ET si prix_m2_lls est calibré ; sinon « impact non chiffré ».
  # Seuils de déclenchement de la clause (Art. 2, SOURCÉS — logique OU du texte) :
  mixite_sdp_seuil_m2: 1500         # « programme dont la SDP ≥ 1 500 m² » (bornes 1500/1800 du texte)
  mixite_logements_seuil: 20        # « programme de 20 logements ou plus »
  mixite_terrain_seuil_m2: 6000     # « terrain d'habitation de plus de 6 000 m² »
  prix_m2_lls: 0                    # prix de sortie €/m² des logements aidés (PLACEHOLDER, 0 = non calibré).
  majoration_vrd_pluvial: 0         # % de majoration du coût (VRD) en zonage eaux pluviales
  #                                   (0 = badge visible mais effet neutre tant que non calibré).
  # --- Potentiel résiduel (Lot B) ---
  niveaux_bati_existant_defaut: 1   # PLACEHOLDER : niveaux supposés du bâti EXISTANT quand la
  #   hauteur/étages BD TOPO n'est pas ingéré (cas actuel). Prudent (1 = rez) → SOUS-estime la
  #   SDP existante, donc SUR-estime le résiduel. Remplacé automatiquement par nombre_d_etages
  #   BD TOPO dès qu'il est ingéré. Le taux d'emprise, lui, est calculé sans hypothèse de hauteur.
  sous_densite_seuil_pct: 40        # PLACEHOLDER : en deçà de ce taux d'utilisation de l'emprise
  #                                   constructible, une parcelle bâtie est marquée « sous-densité ».
  # --- Assemblage foncier (Lot C5) — PLACEHOLDERS ---
  assemblage_min_surface_m2: 1000   # surface cumulée à partir de laquelle un assemblage « débloque »
  assemblage_individuel_max_m2: 1000  # une parcelle au-dessus n'a pas besoin d'assemblage (exclue des paires)

