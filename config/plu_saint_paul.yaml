# -----------------------------------------------------------------------------
# BASSIN DE VIE SAINT-PAUL CENTRE — groupe U1  (✅ EXTRAIT & SOURCÉ)
# Section : pages imprimées 9-32 (PDF 13-36).
# -----------------------------------------------------------------------------
zones:

  U1a:
    bassin: "Saint-Paul Centre"
    hauteur:
      he_m: 12            # 9 m dans la bande de 15 m depuis la voie ; 12 m au-delà
      hf_m: 16            # 13 m dans la bande de 15 m ; 16 m au-delà
      note: "Bande 15 m depuis voie : hé 9 / hf 13. Au-delà (ou si jouxte bâti >3 niveaux) : hé 12 / hf 16."
      source: "Zone U1a, Art. 10.2, p. imprimée 20-21"
    emprise_sol_pct: null
    emprise_source: "Art. 9, p. 20 : « Il n'est pas fixé de règle »"
    recul_voirie_m: "a_verifier"
    recul_voirie_source: "Art. 6, p. 16-18 : valeurs multiples (alignement / retrait 3 m / 8 m selon cas) non attribuables sûrement à U1a sans relecture ciblée"
    recul_limites_sep_m: 3
    recul_limites_note: "Implantation sur limite autorisée (longueur max 18 m) ; sinon retrait ≥ 3 m. Dans bande de 3 m depuis la limite, H max = 9 m."
    recul_limites_source: "Art. 7.2, p. 17-18"
    stationnement:
      logement: "1 place / logement"
      logement_aide: "1 place / logement aidé"
      visiteurs: "1 place / tranche de 5 logements ou lots (opérations > 5)"
      source: "Art. 12.2, p. 23-25"
    pleine_terre_pct: 10
    pleine_terre_note: "Min 10 % d'espaces libres perméables sur le terrain ; dont ≥ 50 % traités en pleine terre plantée. Variantes 30 % (selon secteur) et 50 % (aléa fort PPRI) — à attribuer précisément."
    pleine_terre_source: "Art. 13.1, p. 25"

  U1b:
    bassin: "Saint-Paul Centre"
    hauteur: { he_m: 12, hf_m: 16, source: "Zone U1b, Art. 10.2, p. 20" }
    emprise_sol_pct: null
    emprise_source: "Art. 9, p. 20 : « Il n'est pas fixé de règle »"
    recul_voirie_m: "a_verifier"
    recul_limites_sep_m: 3
    recul_limites_source: "Art. 7.2, p. 17-18"
    stationnement: { logement: "1 place / logement", source: "Art. 12.2, p. 23-24" }
    pleine_terre_pct: 10
    pleine_terre_source: "Art. 13.1, p. 25 (à confirmer 10/30 % pour U1b)"

  U1c:
    bassin: "Saint-Paul Centre"
    hauteur: { he_m: 15, hf_m: 19, source: "Zone U1c, Art. 10.2, p. 20" }
    emprise_sol_pct: null
    emprise_source: "Art. 9, p. 20 : « Il n'est pas fixé de règle »"
    recul_voirie_m: "a_verifier"
    recul_limites_sep_m: 3
    recul_limites_source: "Art. 7.2, p. 17-18"
    stationnement: { logement: "1 place / logement", source: "Art. 12.2, p. 23-24" }
    pleine_terre_pct: "a_verifier"
    pleine_terre_source: "Art. 13.1, p. 25"

  U1d:
    bassin: "Saint-Paul Centre"
    hauteur: { he_m: 6, hf_m: 9, source: "Zones U1d et U1g, Art. 10.2, p. 20" }
    emprise_sol_pct: null
    emprise_source: "Art. 9, p. 20 : « Il n'est pas fixé de règle »"
    recul_voirie_m: "a_verifier"
    recul_limites_sep_m: 3
    recul_limites_source: "Art. 7.2, p. 17-18"
    stationnement: { logement: "1 place / logement", source: "Art. 12.2, p. 23-24" }
    pleine_terre_pct: "a_verifier"
    pleine_terre_source: "Art. 13.1, p. 25"

  U1f:
    bassin: "Saint-Paul Centre"
    hauteur: { he_m: 9, hf_m: 13, source: "Zone U1f, Art. 10.2, p. 20" }
    emprise_sol_pct: null
    emprise_source: "Art. 9, p. 20 : « Il n'est pas fixé de règle »"
    recul_voirie_m: "a_verifier"
    recul_limites_sep_m: 3
    recul_limites_source: "Art. 7.2, p. 17-18"
    stationnement: { logement: "2 places / logement", source: "Art. 12.2, p. 23 (U1f, U1g : 2 places/logt)" }
    pleine_terre_pct: "a_verifier"
    pleine_terre_source: "Art. 13.1, p. 25"

  U1g:
    bassin: "Saint-Paul Centre"
    hauteur: { he_m: 6, hf_m: 9, source: "Zones U1d et U1g, Art. 10.2, p. 20" }
    emprise_sol_pct: null
    emprise_source: "Art. 9, p. 20 : « Il n'est pas fixé de règle »"
    recul_voirie_m: "a_verifier"
    recul_limites_sep_m: 3
    recul_limites_source: "Art. 7.2, p. 17-18"
    stationnement: { logement: "2 places / logement", source: "Art. 12.2, p. 23 (U1f, U1g : 2 places/logt)" }
    pleine_terre_pct: "a_verifier"
    pleine_terre_source: "Art. 13.1, p. 25"

  U1pru:
    bassin: "Saint-Paul Centre"
    hauteur: { he_m: 30, hf_m: 34, source: "Zones U1pru et U1pso, Art. 10.2, p. 21" }
    emprise_sol_pct: null
    emprise_source: "Art. 9, p. 20 : « Il n'est pas fixé de règle »"
    recul_voirie_m: "a_verifier"
    recul_limites_sep_m: 3
    recul_limites_source: "Art. 7.2, p. 17-18"
    stationnement: { logement: "a_verifier", source: "Art. 12.2 — « sauf en zone U1pru » pour certaines obligations" }
    pleine_terre_pct: "a_verifier"
    pleine_terre_note: "En U1pru, plantations dans ≥ 80 cm de terre comptées comme pleine terre (Art. 13.3, p. 25)."
    pleine_terre_source: "Art. 13, p. 25"

  U1pso:
    bassin: "Saint-Paul Centre"
    hauteur: { he_m: 30, hf_m: 34, source: "Zones U1pru et U1pso, Art. 10.2, p. 21" }
