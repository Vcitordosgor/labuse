#   PLU approuvé le 27/09/2012, édition mars 2026 (413 pages).
#   ⚠️ La mairie/ta consigne mentionnait 2019 ; le document officiel dit bien 2012
#      (+ modifs successives jusqu'au 27/03/2025). Valeur reportée telle quelle.
#
# CONVENTIONS DE FIABILITÉ (consigne : n'inventer AUCUNE valeur) :
#   - page_pdf = page_imprimee + 4   (vérifié : imprimée 1 = PDF 5)
#   - chaque valeur cite ZONE + ARTICLE + PAGE imprimée.
#   - null            = règle explicitement "non réglementée" dans le texte.
#   - "a_verifier"    = présent mais ambigu / conditionnel / non attribuable
#                       sûrement à la sous-zone -> NE PAS s'en servir tel quel.
#   - structure article (PLU à 16 articles) : 6=recul voirie, 7=recul limites,
#     9=emprise, 10=hauteur, 12=stationnement, 13=espaces libres/pleine terre.
#   - hauteurs : hé = égout/acrotère, hf = faîtage (valeurs en mètres).
# =============================================================================

