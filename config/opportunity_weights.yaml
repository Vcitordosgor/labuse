# LA BUSE — Score d'OPPORTUNITÉ (0–100), dérivé de la cascade  [brief §7B/§7C]
#
#   si une couche = HARD_EXCLUDE : score = 0 (statut "exclue" ou "faux_positif_probable")
#   sinon :
#     base       = 50
#     pénalités  = Σ ( penalite_base × mult_severite )   # un par SOFT_FLAG
#     bonus      = Σ ( bonus_couche )                     # un par POSITIVE
#     score = clamp(base − pénalités + bonus, 1, 100)
#     score = clamp(score + ai_adjustment, 1, 100)        # ai_adjustment ∈ [−20, +20]
#
# Tous ces poids sont TUNABLES et destinés à être nourris par le feedback (§10).

base_score: 50
penalty_per_flag: 5          # pénalité de base par SOFT_FLAG (un flag "fort" ≈ −15)

severity_multipliers:
  faible: 1
  moyen: 2
  fort: 3

ai_adjustment_bounds: [-20, 20]
score_bounds: [1, 100]       # plancher 1 quand non exclue (0 réservé à HARD_EXCLUDE)

# Bonus (POSITIVE). La couche émet un "bonus_key" ; le poids ici = PLAFOND du bonus.
# La couche peut renvoyer une `magnitude` ∈ [0,1] (intensité calculée sur la donnée
# réelle) ; le score appliqué = round(poids × magnitude). magnitude = 1 pour les
# signaux binaires (zone U, accès). Tout reste BORNÉ et TRACÉ (weight_applied + libellé).
bonuses:
  potentiel_foncier_region: 12      # × taux de recouvrement de l'îlot (largement dedans > effleure)
  proprietaire_morale_acquerable: 12
  permis_sitadel_recent_proximite: 8
  surface_utile: 8                  # × courbe saturante sur la surface (plafonne : une parcelle géante ne gagne pas mécaniquement)
  zonage_u_au: 8                    # binaire (zone U/AU)
  contexte_dvf_favorable: 8         # × marché réel : médiane €/m² (terrain) + liquidité (nb mutations)
  acces_direct_voirie: 3            # binaire
  # proximite_equipements_bpe : SUPPRIMÉ — bonus mort (aucune couche ne l'émettait).
  #   Brancher une vraie couche équipements (BPE/OSM) est une tâche d'INGESTION séparée.

# --- Décision de statut (règles dures, brief §7C) ---
status_rules:
  opportunity_threshold: 65      # opp ≥ 65 ET complétude ≥ 50 → "opportunite"
  completeness_floor: 50         # complétude < 50 → statut plafonné à "a_creuser"
  # RÈGLE D'OR : l'opportunité ne s'affiche JAMAIS seule, toujours avec la complétude.

# --- Réinjection du feedback terrain (§10) — agrégation par ZONE, TUNABLE ---
# Le feedback est agrégé par PROXIMITÉ géographique (rayon) : une zone qui
# accumule des "false_positive" applique une décote au score d'opportunité des
# parcelles de la zone ; les "good_lead" remontent légèrement. Transparent et
# tracé dans la fiche ("score ajusté par retour terrain"). Ne court-circuite PAS
# la règle d'or (la complétude garde la main).
feedback:
  zone_radius_m: 300             # rayon d'agrégation du retour terrain
  false_positive_decote: 8       # décote par faux positif dans la zone
  good_lead_bonus: 6             # bonus par bon lead dans la zone
  not_interested_decote: 3       # légère décote par "pas intéressé"
  max_adjustment: 20             # borne de l'ajustement total |Δ|
