# LA BUSE — Règles de la CASCADE D'EXCLUSION  [brief §2, cœur du produit]
#
# Séquence ORDONNÉE de couches. Le moins cher / le plus décisif d'abord.
# Chaque couche renvoie un verdict : HARD_EXCLUDE / SOFT_FLAG / POSITIVE / PASS / UNKNOWN
# et écrit un MOTIF HUMAIN (cascade_results.detail) — la traçabilité EST le produit.
#
# phase 1 = géométrique, locale, instantanée (PostGIS, sur TOUTES les parcelles)
# phase 2 = coûteuse, externe, IA (UNIQUEMENT sur parcelles promues)
#
# `name`   : identifiant de l'implémentation enregistrée (registry du moteur)
# `enabled`: active/désactive la couche sans toucher au code
# `params` : paramètres propres à la couche (table spatiale visée, seuils, sévérités…)

layers:

  # ───────────────────────── PHASE 1 — géométrique ─────────────────────────

  - name: eau
    phase: 1
    enabled: true
    params:
      spatial_kind: water
      # exclusion si le centroïde OU la majorité de surface est sur l'eau
      majority_threshold: 0.5
      detail_exclude: "Exclue : parcelle majoritairement sur l'eau (hydrographie)."

  - name: parc_national
    phase: 1
    enabled: true
    params:
      spatial_kind: parc_national
      # cœur = éliminatoire (UNESCO) ; aire d'adhésion = flag (contraintes de charte)
      coeur_subtype: coeur
      adhesion_subtype: adhesion
      adhesion_severity: moyen

  - name: foret_publique
    phase: 1
    enabled: true
    params:
      spatial_kind: foret_publique
      # forêt domaniale = HARD_EXCLUDE ; autre forêt publique = flag fort
      domaniale_subtype: domaniale
      mode_default: hard_exclude     # hard_exclude | flag_fort

  - name: sar
    phase: 1
    enabled: true
    params:
      spatial_kind: sar
      # DÉCISION 2 (directive post-1.A) : la seule donnée SAR disponible est un PROXY de
      # vocation (potentiel foncier Région) → couche INFORMATIVE, ZÉRO pouvoir d'exclusion
      # (plus jamais de HARD_EXCLUDE ni de SOFT_FLAG — aucun effet score/statut).
      # Warning de divergence (PASS « ⚠ … ») quand PLU U/AU ∩ proxy naturel/agricole ;
      # mention renforcée sur zone AU (ouverture à l'urbanisation moins probable).
      plu_kind: plu_gpu_zone
      uau_prefixes: [U, AU]
      # vocations « naturel/agricole » du proxy (+ subtypes réglementaires du seed synthétique) :
      divergent_subtypes: [vocation_naturelle, vocation_agricole, vocation_continuite,
                           vocation_coupure, espace_naturel, espace_agricole, coupure_urbanisation]
      # vocations sans a priori constructif (ni divergence ni compatibilité) :
      info_subtypes: [vocation_mixte, vocation_rurale]

  - name: zonage_plu_gpu
    phase: 1
    enabled: true
    params:
      spatial_kind: plu_gpu_zone
      # libelle de zone (libelle court) → verdict.
      # U/AU → POSITIVE (constructible). A (agricole) / N (naturelle) → HARD_EXCLUDE :
      # non constructibles au règlement du PLU de Saint-Paul (plu_saint_paul.yaml). Décision Vic
      # (aligner la cascade sur la réalité PLU). U/AU sont testés AVANT A/N (AU commence par « A »).
      exclude_zones: []                       # sous-zones strictement listées (ex. Nr) — exact match
      positive_prefixes: [U, AU]
      hard_exclude_prefixes: [A, N]
      # DÉCISION 1 : exclusion SENSIBLE AU RECOUVREMENT. HARD_EXCLUDE seulement si la part
      # A+N de la parcelle atteint ce seuil ; en deçà avec une part U/AU → SOFT_FLAG
      # « zonage mixte » + emprise clippée à la portion U/AU dans la pré-faisabilité.
      an_hard_exclude_pct: 90                 # PLACEHOLDER (défaut directive) — à calibrer par Vic
      # plancher en deçà duquel une part A/N est traitée comme liséré géométrique GPU (ignorée) :
      an_mixte_min_pct: 5                     # PLACEHOLDER — à calibrer par Vic
      # préfixes de repli (sous-zones non couvertes par les listes ci-dessus) — vides par défaut :
      flag_fort_prefixes: []
      flag_prefixes: []
      positive_bonus_key: zonage_u_au

  - name: prescription_plu
    phase: 1
    enabled: true
    params:
      spatial_kind: plu_gpu_prescription
      # Mapping typepsc CNIG → classe de contrainte, CALIBRÉ sur les prescriptions RÉELLES
      # de Saint-Paul (API Carto GPU) — le libellé GPU reste toujours affiché, jamais inventé :
      #   01 EBC · 05 emplacement réservé · 07 élément bâti protégé (L151-19) ·
      #   17 (+16) secteur de mixité sociale · 18 OAP · 48 zonage eaux pluviales
      emplacement_reserve_typepsc: ["05"]
      boise_classe_typepsc: ["01"]
      patrimoine_bati_typepsc: ["07"]
      mixite_sociale_typepsc: ["16", "17"]
      oap_typepsc: ["18"]
      eaux_pluviales_typepsc: ["48"]
      # DÉCISION 3.a : recouvrement ER (en % de la parcelle) à partir duquel la parcelle est
      # exclue (emprise majoritairement grevée) ; en deçà → SOFT_FLAG + surface ER déduite de
      # l'emprise constructible dans la pré-faisabilité.
      er_hard_exclude_pct: 50                 # PLACEHOLDER (défaut directive) — à calibrer par Vic

  - name: safer
    phase: 1
    enabled: true
    params:
      spatial_kind: safer
      severity: moyen
      detail: "Parcelle en zone agricole (proxy RPG/IGN — préemption SAFER possible)."

  - name: risques
    phase: 1
    enabled: true
    params:
      spatial_kind_ppr: ppr
      spatial_kind_alea: georisque_alea
      # PPR ZONÉ (DEAL Réunion, B2) : subtype = DEGRE. Zone rouge = 'INTERDICTION' → HARD_EXCLUDE
      # (inconstructible) ; 'PRESCRIPTION' (bleu, constructible sous conditions) → SOFT_FLAG (branche
      # non-rouge). Aléa (georisque_alea) : niveau faible/moyen/fort → flag gradué.
      ppr_red_subtypes: ['INTERDICTION']
      # Étape A (quick-win PPR v2) : couverture MINIMALE du périmètre PM1 (% de la parcelle) en deçà
      # de laquelle l'intersection est jugée MARGINALE → note informative FAIBLE au lieu d'un flag FORT
      # (le périmètre seul ne dit pas rouge/bleu ; un bord rogné n'est pas une contrainte forte présumée).
      # Conservateur (10 %). Un seuil plus agressif (30 %) nécessiterait une validation séparée.
      # Le rouge/bleu réglementaire reste géré à part (Étape B) ; le seuil de scoring (65) est inchangé.
      min_coverage_pct: 10
      alea_severity_map:
        fort: fort
        moyen: moyen
        faible: faible

  - name: ravine
    phase: 1
    enabled: true
    params:
      spatial_kind: ravine
      # proximité d'une ravine (thalweg BD TOPO) → SOFT_FLAG. Buffer PLACEHOLDER (défaut Vic 10 m) :
      buffer_m: 10
      severity: moyen
      # 2.C — quand une SURFACE en eau existe (ravine large), on mesure au BORD (berge), plus proche
      # que l'axe ; sinon à l'axe du tronçon. Les `berge_kinds` sont des surfaces hydrographiques :
      berge_kinds: [water]
      # rayon de garde du précalcul batch (doit être ≥ buffer_m ; couvre un réglage à la hausse) :
      search_cap_m: 60

  - name: trait_de_cote
    phase: 1
    enabled: true
    params:
      spatial_kind: trait_de_cote
      # bande de recul du trait de côte : exclude sur la bande la plus proche, flag au-delà
      exclude_subtypes: [bande_courte]
      flag_subtypes: [bande_longue]
      flag_severity: moyen

  - name: pente
    phase: 1
    enabled: true
    params:
      # 2.A : la pente est CALCULÉE et AFFICHÉE ; au-delà de `seuil_flag_pct` → SOFT_FLAG
      # (driver de coût terrassement, jamais une exclusion). Seuil PLACEHOLDER (défaut Vic 30 %).
      exclude: false
      seuil_flag_pct: 30      # PLACEHOLDER — au-delà : SOFT_FLAG « pente forte »
      # ÉTAGE 0 (bloquant FRANC, fusion du déclassement) : au-delà de ce seuil le terrain n'est
      # pas aménageable → HARD_EXCLUDE (faux positif). 40–60 % → « à creuser » (déclassement,
      # étage 1). Ex-constante declassement.py PENTE_FAUX_PCT.
      seuil_faux_positif_pct: 60
      severity: moyen
      slope_labels:           # pente en %, bornes hautes
        faible: 10
        modere: 20
        fort: 30
        tres_fort: 9999
      sample_points: 9        # échantillonnage altimétrique dans la parcelle

  - name: abf
    phase: 1
    enabled: true
    params:
      spatial_kind: abf
      # DÉCISION dry-run étages 1/2 (Vic/Claude) : le tampon 500 m Mérimée SUR-COUVRE (60,6k
      # parcelles île, covisibilité NON instruite). Un abord non instruit est une INCERTITUDE, pas
      # un malus → on ne touche NI n'enlève de point d'opportunité. Verdict UNKNOWN → impacte la
      # COMPLÉTUDE, et le flag reste affiché. (Basculer à soft_flag = mettre as_unknown:false.)
      as_unknown: true
      severity: faible   # utilisé seulement si as_unknown:false
      detail: "Abords MH ~500 m (tampon) — covisibilité à instruire."

  - name: ens
    phase: 1
    enabled: true
    params:
      spatial_kind: ens
      severity: moyen
      detail: "Espace protégé réglementaire (réserve / APB / conservatoire…) — restriction."

  - name: ocs_ge
    phase: 1
    enabled: true
    params:
      spatial_kind: ocs_ge
      # sol naturel/agricole (logique ZAN) → flag faible ; artificialisé → PASS
      naturel_subtypes: [naturel, agricole]
      severity: faible

  - name: osm_faux_positif
    phase: 1
    enabled: true
    params:
      spatial_kind: osm_faux_positif
      # cimetière / terrain de sport / parking / école SUR la parcelle
      hard_exclude_subtypes: [cemetery, school]
      flag_fort_subtypes: [pitch, parking]
      coverage_threshold: 0.3       # part de surface couverte pour déclencher
      # ÉTAGE 0 (bloquant FRANC, fusion du déclassement) : un équipement OSM couvrant ≥ ce
      # seuil (quel que soit le subtype) → la parcelle EST l'équipement → HARD_EXCLUDE (faux
      # positif). En deçà, pitch/parking restent un flag ; 0.3–0.5 → « à creuser » (déclassement,
      # étage 1). Ex-constante declassement.py OSM_FAUX_COVERAGE.
      faux_positif_coverage: 0.50

  - name: bati
    phase: 1
    enabled: true
    # ÉTAGE 0 (bloquant FRANC, correctif R1 « déjà bâti ») : occupation bâtie FRANCHE
    # (déjà bâti / ensemble bâti, cf. bati.classify → declasse == 'faux_positif') → HARD_EXCLUDE.
    # La classification graduée porte les paliers (source unique de vérité labuse/bati.py,
    # partagée avec la fiche « Occupation ») : PAS de seuil dupliqué ici. Le cas non-franc
    # (partiellement bâti → « à creuser ») reste un flag du déclassement (étage 1). Les signaux
    # bâtis sont lus dans ctx.declass_signals (batch, calculés une seule fois par le pipeline).
    params: {}

  - name: acces
    phase: 1
    enabled: true
    params:
      spatial_kind: voirie         # tronçons de voirie (BD TOPO) pré-ingérés
      direct_access_m: 25          # voirie à ≤ 25 m → accès direct (bonus)
      bonus_key: acces_direct_voirie

  - name: surface
    phase: 1
    enabled: true
    params:
      # ⚠ DÉCISION PRODUIT : surface CALCULÉE et AFFICHÉE, mais PAS de seuil dur (exclusion).
      # Repère (Potentiel foncier Région) : 500 m² bâti / 200 m² vierge.
      exclude: false
      penalize: false
      threshold_enabled: false
      min_surface_m2_bati: 500
      min_surface_m2_vierge: 200
      # ÉTAGE 0 (bloquant FRANC, fusion du déclassement) : en deçà de ce seuil, aucun programme
      # n'est possible → micro-parcelle → HARD_EXCLUDE (faux positif). 100–250 m² → « à creuser »
      # (déclassement, étage 1). Ex-constante declassement.py SURFACE_FAUX_M2. Distinct du seuil
      # dur de valorisation ci-dessus (désactivé) : celui-ci élimine, il n'est pas une pénalité.
      faux_positif_max_m2: 100
      # COURBE SATURANTE (bonus surface_utile, magnitude 0..1). Bornes pour la promotion réunionnaise :
      #   < 400 m²  : magnitude 0 (sous le seuil d'une opération de promotion utile)
      #   400→2500 m² : montée linéaire 0→1 (chaque m² ajoute de la capacité programme)
      #   ≥ 2500 m² : PLAFOND à 1 (au-delà, valeur marginale plate : phasage, viabilisation,
      #               servitudes — une parcelle géante peut être un piège, elle ne « gagne » pas mécaniquement)
      bonus_key: surface_utile
      sweet_spot_lo_m2: 400
      sweet_spot_hi_m2: 2500

  # ───────────────────── ÉTAGE 1 (dry-run) — QUALITÉ ─────────────────────
  # Signaux de qualité (bonus/malus/flags) sur les survivants. Non branchés au live (dry-run).
  - name: friche          # Cartofriches : terrain à reconvertir = signal POSITIF
    phase: 1
    enabled: true
    params:
      spatial_kind: friche
      bonus_key: friche
      magnitude_avec_projet: 1.0    # « friche avec projet » → +8 (plafond)
      magnitude_sans_projet: 0.6    # « friche sans projet »  → +5 (gisement moins mûr)
  - name: sol_pollue      # coût de dépollution INCONNU → le FLAG prime (survit à la fiche), malus léger
    phase: 1
    enabled: true
    params:
      spatial_kind: sol_pollue
      proximite_m: 100          # LOT 2 data-gap : CASIAS sur la parcelle ou < 100 m (etait 50)
      severity: faible          # CASIAS/instruction : malus leger
      severity_sis: moyen       # LOT 2 : parcelle DANS un perimetre SIS -> malus Stage 1 moyen
      detail: "Site pollué recensé (CASIAS/instruction) à proximité — étude de sol à prévoir, coût de dépollution potentiel."
  - name: sup             # LOT 4 data-gap : assiettes de servitudes d'utilité publique (GPU)
    phase: 1
    enabled: true
    params:
      spatial_kind: sup
      # severites par categorie codees dans SUP_SEVERITES (etage1.py) : t5 fort, t4/t7/i4/i1/i3
      # moyen, defaut faible ; pm*/ac1/ac2/el10 = info x0 (anti-double-compte risques/abf/parc)
  - name: bruit_route     # LOT 3 data-gap : secteurs affectes par le bruit (classement sonore Cerema)
    phase: 1
    enabled: true
    params:
      spatial_kind: bruit_route
  - name: cinquante_pas   # LOT 6 data-gap : corridor limite haute des 50 pas (approximation documentee)
    phase: 1
    enabled: true
    params:
      spatial_kind: cinquante_pas
      severity: faible
  - name: cavite          # risque d'effondrement → flag prime, malus léger
    phase: 1
    enabled: true
    params:
      spatial_kind: cavite
      proximite_m: 50
      severity: faible
      detail: "Cavité souterraine recensée à proximité — étude à prévoir."
  - name: icpe            # voisinage industriel → malus GRADUÉ par distance
    phase: 1
    enabled: true
    params:
      spatial_kind: icpe
      bandes_m: { fort: 50, moyen: 150, faible: 300 }   # ≤50 fort · ≤150 moyen · ≤300 faible · au-delà rien
      detail: "Installation classée (ICPE) à proximité — nuisances/voisinage industriel."
  - name: mvt             # mouvement de terrain : FLAG INFORMATIF, 0 point (aléa déjà dans PPR)
    phase: 1
    enabled: true
    params:
      spatial_kind: mvt
      proximite_m: 50
      severity: info       # multiplicateur ×0 → affiché mais sans double-compter le PPR
      detail: "Mouvement de terrain recensé à proximité (aléa réglementaire déjà pris en compte via PPR)."
  - name: amenites        # score d'aménités agrégé (école/commerce/santé/tcsp) — CONFORT, plafond 11
    phase: 1
    enabled: true
    params:
      bonus_key: amenites
      # Bandes de proximité (contexte 974 tout-voiture) : plein ≤500 m, 0.5 en 500–1200 m, 0 au-delà.
      # tcsp se juge à pied → bandes plus serrées (300/800). Pondérations : école+commerce priment.
      bandes_defaut_m: { plein: 500, demi: 1200 }
      bandes_tcsp_m: { plein: 300, demi: 800 }
      ponderations: { ecole: 0.30, commerce: 0.30, sante: 0.20, tcsp: 0.20 }

  # ── ÉTAGE 0 ÉTENDU (mandat cascade île 08/07/2026) — actives à Saint-Paul depuis le run
  # q_v2 (implémentation jamais committée, découverte à l'audit C4), GRAVÉES ici et étendues
  # aux 24 communes. Règles = reproduction exacte des verdicts SP (diff zéro prouvé).
  - name: foncier_public
    phase: 1
    enabled: true
    params: {}
  - name: emprise_lineaire
    phase: 1
    enabled: true
    params: {}
  - name: residuel_socle
    phase: 1
    enabled: true
    params: {}

  # ───────────────────────── PHASE 2 — coûteuse / externe ─────────────────────────

  - name: dvf
    phase: 2
    enabled: true
    params:
      radii_m: [250, 500, 1000]    # rayons d'agrégation autour du centroïde
      lookback_years: 5
      bonus_key: contexte_dvf_favorable
      # MARCHÉ CONTINU (magnitude 0..1) = mélange liquidité + niveau de prix, borné.
      #   liquidité : nb de mutations / liquidity_ref, plafonné à 1
      #   prix      : médiane €/m² de TERRAIN, normalisée sur [price_lo, price_hi] €/m²
      #               (calé sur Saint-Paul : p25≈312, médiane≈503, p75≈821 €/m²)
      liquidity_ref: 8
      price_lo_eur_m2: 250
      price_hi_eur_m2: 900
      w_liquidity: 0.5
      w_price: 0.5

  - name: sitadel
    phase: 2
    enabled: true
    params:
      # LOT 8 data-gap : dynamique constructive GRADUEE (densite de PC, plus un booleen).
      radius_m: 400                # 300-500 m au mandat -> 400 m (un permis non rattache = signal de zone)
      lookback_months: 60          # 5 dernieres annees (etait 36)
      types: [PC]                  # permis de construire seulement (DP/PA/PD exclus de la densite)
      saturation_pc: 15            # magnitude = min(1, n_PC / 15) -> bonus plein a 15 PC dans le rayon
      bonus_key: permis_sitadel_recent_proximite

  - name: potentiel_foncier_region
    phase: 2
    enabled: true
    params:
      spatial_kind: potentiel_foncier
      bonus_key: potentiel_foncier_region
      detail: "Intersecte un îlot « Potentiel foncier » Région (signal public)."

  - name: proprietaire
    phase: 2
    enabled: true
    params:
      # POSITIVE si personne morale/publique acquérable ; SOFT_FLAG si indivision.
      # Source = Fichiers fonciers anonymisés (sous convention) ; sinon UNKNOWN.
      bonus_key: proprietaire_morale_acquerable
      indivision_severity: fort
      indivision_min_droits: 2     # nb_droits_propriete ≥ 2 sur un compte = signal indivision

  # ───────────────────── ÉTAGE 2 (dry-run) — ACCESSIBILITÉ ─────────────────────
  - name: age_dirigeant          # INPI : gérant âgé = horizon de transmission (POINTS)
    phase: 2
    enabled: true
    params:
      bonus_key: age_dirigeant
      courbe: { 55: 4, 65: 8, 75: 12, 85: 14 }   # <55→0 · 55-64→+4 · 65-74→+8 · 75-84→+12 · ≥85→+14
      age_min_valide: 18                          # <18 = fiche RNE incohérente → UNKNOWN (invalide)
  - name: dpe_passoire           # DPE F/G maison : FLAG « pression réglementaire datée » (0 point)
    phase: 2
    enabled: true
    params: {}
  - name: bodacc                 # procédures collectives : FLAG 0 point + bascule « chaude » si ROUGE
    phase: 2
    enabled: true
    params:
      # MACHINE À ÉTATS sur les LIBELLÉS RÉELS (SELECT DISTINCT v_foncier_sous_pression, validé Vic).
      # Seul 'rouge' pose evenement='rouge' → force « chaude » (étape 3). orange/gris/neutre = flags 0pt.
      etats:
        rouge:   # procédure OUVERTE / aggravée
          - "Jugement d'ouverture d'une procédure de redressement judiciaire"
          - "Autre jugement d'ouverture"
          - "Jugement d'ouverture d'une procédure de sauvegarde"
          - "Jugement d'ouverture de liquidation judiciaire"
          - "Jugement de conversion en liquidation judiciaire"
          - "Jugement de conversion en redressement judiciaire de la procédure de sauvegarde"
          - "Jugement d'extension d'une procédure de redressement judiciaire"
          - "Jugement d'extension de liquidation judiciaire"
          - "Jugement prononçant la résolution du plan de redressement et la liquidation judiciaire"
        orange:  # sous PLAN (en cours)
          - "Jugement de plan de redressement"
          - "Jugement modifiant le plan de sauvegarde"
          - "Jugement modifiant le plan de redressement"
          - "Jugement arrêtant le plan de sauvegarde"
          - "Jugement modifiant le plan de continuation"
          - "Jugement arrêtant un plan de cession"
        gris:    # CLÔTURÉE (procédure passée)
          - "Jugement de clôture pour insuffisance d'actif"
          - "Jugement de clôture pour extinction du passif"
          - "Autre jugement de clôture"
      # « Liste des créances… LJ » (9) = NEUTRE (Vic : la bascule se fait sur le JUGEMENT, pas les
      # publications de suivi — déjà capté en rouge par ouverture/conversion). Tout le reste = neutre.
      mojibake:   # double-encodage UTF-8 → libellé propre (cf. dette d'ingestion NOTES)
        "Jugement arrÃªtant le plan de sauvegarde": "Jugement arrêtant le plan de sauvegarde"
        "DÃ©pÃ´t de l'Ã©tat des crÃ©ances": "Dépôt de l'état des créances"
