# LA BUSE — Déclaration des couches WMS/WFS (connecteur générique)  [brief §6 hubs]
#
# Le connecteur WFS générique lit ce fichier : pour chaque couche déclarée, il sait
# où taper (endpoint), quel typename demander, et dans quel `spatial_kind` ranger le
# résultat pour la cascade. Superposition carte + intersection PostGIS ; fallback
# lien externe + champ manuel si le flux est indisponible.
#
# reliability : verifie | a_confirmer   (cf. marqueurs du brief)
# ⚠ Aucun endpoint marqué `a_confirmer` ne doit être considéré comme branché tant
#   qu'un appel de test (GetCapabilities) n'a pas confirmé typename + CRS + format.

endpoints:

  geoplateforme_wfs:
    base_url: "https://data.geopf.fr/wfs/ows"
    reliability: verifie
    rate_limit_per_s: 10
    notes: "✓ live (SPIKE 2026-06) : GetFeature BDTOPO_V3:batiment OK (51 M feat). BD TOPO/parcellaire ; OCS GE typename à confirmer."

  deal_reunion:
    base_url: "https://carto.reunion.developpement-durable.gouv.fr"  # à préciser via catalogue DEAL
    reliability: a_confirmer
    notes: "⚠ Hôte injoignable au SPIKE (HTTP 000, 2026-06-07). Risques via Géorisques en proxy ; sinon import."

  peigeo:
    base_url: "https://peigeo.re"  # GeoNetwork/visualiseur AGORAH ; confirmer endpoint OWS
    reliability: a_confirmer
    notes: "⚠ Hôte injoignable au SPIKE (HTTP 000, 2026-06-07). Fallback Région ODS (SAR proxy via potentiel-foncier) / import."

# Couches : chaque entrée mappe un flux distant vers un spatial_kind LA BUSE.
layers:

  - key: bdtopo_hydrographie
    endpoint: geoplateforme_wfs
    typename: "BDTOPO_V3:surface_hydrographique"
    spatial_kind: water
    reliability: a_confirmer        # typename exact à confirmer via GetCapabilities

  - key: bdtopo_batiment
    endpoint: geoplateforme_wfs
    typename: "BDTOPO_V3:batiment"
    spatial_kind: batiment
    reliability: verifie        # ✓ live : GetFeature 200 (SPIKE 2026-06)

  - key: ocs_ge
    endpoint: geoplateforme_wfs
    typename: "OCSGE:occupation_du_sol"   # ⚠ 400 au SPIKE — typename exact à confirmer (GetCapabilities)
    spatial_kind: ocs_ge
    reliability: a_confirmer

  - key: ppr_reunion
    endpoint: deal_reunion
    typename: "PPRN_974"
    spatial_kind: ppr
    reliability: a_confirmer

  - key: trait_de_cote
    endpoint: deal_reunion
    typename: "TRAIT_DE_COTE"
    spatial_kind: trait_de_cote
    reliability: a_confirmer

  - key: sar_zonage
    endpoint: peigeo
    typename: "SAR_REUNION:zonage"
    spatial_kind: sar
    reliability: a_confirmer

  - key: ens_reunion
    endpoint: peigeo
    typename: "ENS:perimetres"
    spatial_kind: ens
    reliability: a_confirmer
