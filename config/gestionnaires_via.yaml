# ─────────────────────────────────────────────────────────────────────────────
# M-VIA · Lot 1 — Mapping GESTIONNAIRES par commune (eau · assainissement · élec)
# ─────────────────────────────────────────────────────────────────────────────
# Rôle : bloc « Gestionnaires » de la fiche. Contact ADMINISTRATIF uniquement —
# AUCUNE donnée sensible, AUCUN tracé de réseau (Vigipirate / rediffusion interdite).
#
# Cadre (haute confiance) :
#  - Compétences EAU POTABLE + ASSAINISSEMENT transférées aux 5 EPCI le 01/01/2020
#    (loi NOTRe). Les communes ne détiennent plus la compétence : le gestionnaire
#    est l'EPCI (en régie communautaire) ou son délégataire (DSP / concession).
#  - ÉLECTRICITÉ = EDF SEI partout à La Réunion (zone non interconnectée, hors Enedis).
#  - Marques : Runéo = Veolia ; CISE Réunion / Sudéau / SAUR Derichebourg Aqua OI =
#    groupe SAUR ; Dionéo = entité CINOR+Runéo (St-Denis) ; La Créole = régie TCO ;
#    Saphir (SEM) = eau BRUTE/irrigation Sud seulement (pas opérateur eau potable).
#
# ⚠ Les délégations changent aux renouvellements de contrat : CHAQUE association est
#    datée « à jour au 2026-07 » et À REVÉRIFIER ANNUELLEMENT. Les incertitudes sont
#    signalées explicitement (confidence + note) — aucune donnée fabriquée.
#
# Sources : SISPEA (services.eaufrance.fr), sites EPCI (cinor.re, cirest.fr, tco.re,
#   civis.re, casud.re), RPQS, opérateurs (runeo.re, cise-reunion.re, sudeau.re,
#   lacreole.re, dioneo.re, sourceo.re, eauxdelapossession.re), BOAMP 25-38872 (2025),
#   Contrat de Progrès CINOR, Cour des comptes (La Créole). Recon interne M-VIA 2026-07.

meta:
  a_jour_au: "2026-07"
  revue: "annuelle"
  disclaimer: >-
    Gestionnaires administratifs à jour au 2026-07, à revérifier annuellement
    (les délégations changent aux renouvellements de contrat). Contact
    administratif uniquement — aucun tracé de réseau (donnée sensible).
    Viabilité (eau, électricité, assainissement) à confirmer auprès des
    concessionnaires via DT-DICT (reseaux-et-canalisations.gouv.fr).
  electricite_partout:
    gestionnaire: "EDF SEI"
    detail: "La Réunion = zone non interconnectée, gérée par EDF SEI (hors Enedis)."
    raccordement: "EDF SEI Réunion — raccordement.reunion@edf.fr / edf.re"

# Détenteur de la compétence eau/assainissement (EPCI depuis 01/01/2020).
epci_competence:
  CINOR:  { nom: "Communauté intercommunale du Nord de La Réunion", contact: "cinor.re" }
  CIREST: { nom: "Communauté intercommunale Réunion Est",           contact: "cirest.fr" }
  TCO:    { nom: "Territoire de la Côte Ouest",                       contact: "tco.re" }
  CIVIS:  { nom: "Communauté intercommunale des Villes solidaires",   contact: "civis.re" }
  CASUD:  { nom: "Communauté d'agglomération du Sud",                 contact: "casud.re" }

# Par commune : opérateur eau potable / assainissement collectif + confidence + note.
