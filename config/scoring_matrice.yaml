# Matrice Q×A (étape 3, dry-run) — tunable. Statut = croisement Qualité × Accessibilité.
# Q = « vaut-il le coup / peut-on construire » (étages 0/1). A = « peut-on l'acheter » (étage 2).
# Chaque score = base + Σ(poids de son étage), borné [1,100]. Une parcelle exclue étage 0 = écartée.
#
# ═══ CE FICHIER EST LA CONVENTION DE MATRICE — VERSIONNÉE ═══
# La barre des « chaudes » est un RÉGLAGE, plus jamais une constante enfouie (leçon du run
# île : deux conventions sous un même label = tops inter-communes faux). Changer la barre =
# éditer `seuils` ci-dessous + `labuse matrice-apply` (minutes, jamais un re-run de cascade).
# Simuler avant de trancher : `labuse matrice-simulate` (à blanc, grille HTML).
convention:
  version: 2
  date: "2026-07-08"
  justification: >
    CONVENTION OFFICIELLE — tranchée par Vic le 08/07/2026 après revue de la grille de
    sensibilité (docs/tops_ile/matrice_sensibilite.html) : Q>=65 · A>=60 · complétude>=50
    = 719 chaudes / 166 dossiers île. Motif : signal jugé déjà resserré ; le simulateur
    (labuse matrice-simulate) permet de resserrer plus tard en minutes. Historique : v1
    (implicite) = mêmes valeurs appliquées au run île du 07/07 ; Saint-Paul réaligné
    (83→375 chaudes, son état venait d'une convention jamais committée).

base: 50

# Couches d'ACCESSIBILITÉ (A). Tout le reste = Qualité (Q).
a_layers:
  - proprietaire
  - age_dirigeant
  - dvf
  - sitadel
  - bodacc
  - dpe_passoire

seuils:
  q_chaude: 65            # Q≥65 (Q65 vs Q70 : le Q pur plafonne ~80, poids pas encore affinés → 70 raterait de bonnes cibles 66-69 pour un simple sous-calibrage)
  a_chaude: 60            # A≥60 : isole les ~9 % à signal d'accessibilité RÉEL (A bimodale ; la masse « inconnue » stagne à ~50)
  a_completude_min: 50    # DOUBLE VERROU (règle d'or) : jamais « chaude » sur une accessibilité connue à moins de 50 %
  q_ecartee: 50           # Q<50 (survivant de faible qualité) → écartée

# Bascule événementielle : BODACC procédure OUVERTE (evenement='rouge') → « chaude » quel que soit Q/A,
# SUR LES SURVIVANTES (l'exclusion étage 0 — non constructible — n'est pas surchargée par un événement).
# ⚠ DOCTRINE — NE PASSE PAS SOUS LES SEUILS : un vendeur en procédure collective est une
# urgence de prospection quelle que soit la barre du moment. matrice-simulate ne balaie
# JAMAIS cette clé ; la parcelle-canari 97415000AC0253 (chaude PAR événement) doit survivre
# à toute convention — si elle tombe, c'est la bascule qui est cassée, pas un seuil.
evenement_rouge_force_chaude: true
